services:
  d1_arm_bridge:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: go2w_d1_arm:humble
    network_mode: host
    environment:
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
      UNITREE_NETWORK_INTERFACE: ${UNITREE_NETWORK_INTERFACE:-}
      ROS_NETWORK_INTERFACE: ${ROS_NETWORK_INTERFACE:-}
      D1_TRANSPORT_SOCKET_PATH: ${D1_TRANSPORT_SOCKET_PATH:-}
    command: ["/start_bridge.sh"]
    stdin_open: true
    tty: true
    restart: "no"
